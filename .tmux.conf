# =========================
# Plugin manager
# =========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'
set -g @continuum-boot 'on'

# =========================
# General
# =========================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm*:Tc"
set -g mouse on
set -g history-limit 10000
set -g xterm-keys on

# =========================
# Status Bar (Final Contrast++)
# =========================
set -g status on
set -g status-interval 2
set -g status-justify left
set -g status-style "bg=#000000,fg=#b5b5b5"
set -g status-left-length 40
set -g status-right-length 100

# Left: session name (inactive style)
set -g status-left "#[bg=#222222,fg=#c0c0c0] #S #[bg=#000000,fg=#000000] "

# Window list
setw -g window-status-separator ""

# Inactive windows
setw -g window-status-format "#[bg=#222222,fg=#d0d0d0] #I #W #[bg=#000000,fg=#000000] "

# Active window (more brighter)
setw -g window-status-current-format "#[bg=#4a4a4a,fg=#ffffff,bold] #I #W #[bg=#000000,fg=#000000] "

# Right: time + date + host
set -g status-right "#[bg=#222222,fg=#d0d0d0] %I:%M %p #[bg=#000000,fg=#000000] #[bg=#222222,fg=#d0d0d0] %d %b #[bg=#000000,fg=#000000] #[bg=#222222,fg=#d0d0d0] #h "

# =========================
# Pane Borders (Subtle)
# =========================
set -g pane-border-style "fg=#202020"
set -g pane-active-border-style "fg=#303030"

# =========================
# Messages & Copy Mode
# =========================
set -g message-style "bg=#181818,fg=#808080"
set -g message-command-style "bg=#181818,fg=#808080"
setw -g mode-style "bg=#202020,fg=#d0d0d0"

# =========================
# Clock
# =========================
set -g clock-mode-colour "#808080"

# =========================
# Indexing
# =========================
set -g base-index 1
setw -g pane-base-index 1

# =========================
# Keybindings
# =========================
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Splits
bind V split-window -h
bind H split-window -v

# Resize panes (Alt + hjkl)
bind -n M-h resize-pane -L 1
bind -n M-j resize-pane -D 1
bind -n M-k resize-pane -U 1
bind -n M-l resize-pane -R 1

# =========================
# Copy mode (Vim style)
# =========================
setw -g mode-keys vi

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in -rmlastnl"
bind-key -T copy-mode-vi Escape send -X cancel

# =========================
# TPM (must be last)
# =========================
run '~/.tmux/plugins/tpm/tpm'
